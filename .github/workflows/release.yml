name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/jav-organizer:${{ github.ref_name }} .

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/jav-organizer:${{ github.ref_name }}

      - name: Push latest tag
        if: contains(github.ref_name, 'v')
        run: |
          docker tag ghcr.io/${{ github.repository_owner }}/jav-organizer:${{ github.ref_name }} \
            ghcr.io/${{ github.repository_owner }}/jav-organizer:latest
          docker push ghcr.io/${{ github.repository_owner }}/jav-organizer:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
